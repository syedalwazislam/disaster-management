version: "3.8"

services:
  app:
    image: node:18
    container_name: ci_cd_web_app
    working_dir: /app

    volumes:
      - ./:/app   # 👈 Code is mounted (NO Dockerfile build)

    ports:
      - "7100:3000"   # 👈 EC2 PORT : Container PORT

    command: sh -c "npm install && npm run dev"

    environment:
      - NODE_ENV=development

    stdin_open: true
    tty: true
